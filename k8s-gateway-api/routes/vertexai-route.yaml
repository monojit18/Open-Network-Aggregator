kind: HTTPRoute
apiVersion: gateway.networking.k8s.io/v1beta1
metadata:
  name: vertexai-route  
  labels:
    gateway: external-https
spec:
  parentRefs:
  - kind: Gateway
    name: external-https
    namespace: gateway-ns  
  hostnames:
  - "onix-dev.gcpwkshpdev.com"
  rules:  
  - matches:
    - path:
        type: PathPrefix
        value: /languages
    - path:
        type: PathPrefix
        value: /translate
    backendRefs:
    - name: translateapp-svc
      port: 80
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /genai    
  #   backendRefs:
  #   - name: genaitextapp-svc
  #     port: 80