openapi: 3.0.0
info:
  title: Google Agentic Core API
  description: Google Agentic Core API specification
  version: 0.0.1

security:
- ApiKeyAuth: []  
paths:
  /search:
    post:
      tags:
      - Domain spaecific search
      - Google Agentic framework
      - Video, Webcast, Podcasts
      description: Domain spaecific search by Google Agentic framework from various Content Providers |
        outside the Open Networks - Videos, Webcasts, Podcasts
      requestBody:
        description: Search service by Google Agentic framework.
        content:
          application/json:
            schema:
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    network:
                      $ref: '#/components/schemas/Network'
              required:
              - context
              - message
      responses:
        '200':
          description: Acknowledgement of message received.
          content:
            application/json:
              schema:
                type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    catalog:
                      $ref: '#/components/schemas/Catalog'
                    network:
                      $ref: '#/components/schemas/Network'
                  required:
                  - catalog
                  - network
                error:
                  $ref: '#/components/schemas/Error'
              required:
              - context               

components:
  securitySchemes:
    ApiKeyAuth:
        type: apiKey
        in: header
        name: X-API-Key
  schemas:
    Ack:
      description: Describes the ACK response
      type: object
      properties:
        status:
          type: string
          description: Describe the status of the ACK response. If schema validation passes, status is ACK else it is NACK
          enum:
          - ACK
          - NACK
      required:
      - status

    Context:
      description: Describes a message context
      type: object
      properties:
        domain:
          $ref: '#/components/schemas/Domain'
        location:
          type: object
          description: Contains a reverse geocoded address from user's current location (*Mobile Device or Web*).
          properties:
            address:
              type: string
            country:
              $ref: '#/components/schemas/Country/properties/code'
            city:
              $ref: '#/components/schemas/City/properties/code'
            zip:
              type: string         
        version:
          type: string
          description: Version of Google Agentic framework API specification.
        transaction_id:
          type: string
          description: This is a unique value which persists across all API calls from search through confirm.
        message_id:
          type: string
          description: This is a unique value which persists during a request / callback cycle.
        timestamp:
          type: string
          format: date-time
          description: Time of request generation in RFC3339 format.
        callback_url:
          type: string          
          description: URL to be called by BAPs in response to the search() function call. This is only needed for the Async mode.
      required:
      - domain
      - country
      - city
      - version
      - transaction_id
      - message_id
      - timestamp

    Country:
      description: Describes a country.
      type: object
      properties:
        name:
          type: string
          description: Name of the country.
        code:
          type: string
          description: Country code as per ISO 3166-1 and ISO 3166-2 format.

    City:
      type: object
      description: Describes a city.
      properties:
        name:
          type: string
          description: Name of the city.
        code:
          type: string
          description: City code.

    Domain:
      type: string
      description: Describes the domain or network name of the used in the transaction; e.g. ONDC, ONEST, VIDEO etc. |
        This is primarily used internally by the framework. BAPs are expected to send this as-is in their response |
        to the search() request.

    Network:      
      type: object
      description: Describes details of the target network.
      properties:
        name:
          type: string      
        relevant_text:
          type: string
        filters:
          type: array
          items:
            $ref: '#/components/schemas/VideoItem'
      required:
      - name    
      - relevant_text
      - filters

    Catalog:
      description: Item containing Search response from the BAPs or Content providers.
      type: object
      properties:
        descriptor:
          type: object
          properties:
            name:
              type: string
        provider:
          type: object
          properties:
            descriptor:
              type: object
              properties:
                name:
                  type: string          
            items:
              type: array
              items:
                type: object
                description: This can be a list of any type of objects describing the data from Video providers.
          required:
          - descriptor
          - embedding_url
      required:
      - descriptor
      - provider

    VideoItem:
      description: Item containing Video search query to the Video content providers.
      type: object
      properties:
        query:
          type: string
      required:
      - query

    Error:
      description: Describes an error object.
      type: object
      properties:
        type:
          type: string
          enum:
            - CONTEXT_ERROR
            - CORE_ERROR
            - DOMAIN_ERROR            
            - JSON_SCHEMA_ERROR
        code:
          type: string
          description: Error code from a list of error codes from Google Agentic framework.
        path:
          type: string
          description: Path to json schema generating the error. Used only during json schema validation errors.
        message:
          type: string
          description: Human readable message describing the error.
      required:
      - type
      - code
      