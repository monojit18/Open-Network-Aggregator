openapi: 3.0.0
info:
  title: Google Agentic Core API
  description: Google Agentic Core API specification
  version: 0.0.1

security:
- ApiKeyAuth: []  
paths:
  /search:
    post:
      tags:
      - Domain spaecific search
      - Google Agentic framework
      - Master Agent
      description: Master Agent of the Google Agentic framework to transform text query into actionable insights
      requestBody:
        description: Search service by Google Agentic framework.
        content:
          application/json:
            schema:
              type: object
              properties:                
                transaction_id:
                  type: string
                message_id:
                  type: string
                query:
                  type: string
                location:
                  type: object
                  description: Contains location details of the user (*Mobile Device or Web*).
                  properties:
                    mob:
                      type: string
                    city:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
                    lat:
                      type: string
                    lng:
                      type: string
                    zip:
                      type: string
                preferred_networks:
                  type: object
                  description: Contains a list of target Affilaites and/or Content providers.|
                    Google Agentic framework will route requests appropriately to these networks.
                  properties:
                    $ref: '#/components/schemas/PreferredNetwork'                  
              required:
              - transaction_id
              - message_id
              - query
              - preferred_networks
      responses:
        '200':
          description: Acknowledgement of message received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                    - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                - message

components:
  securitySchemes:
    ApiKeyAuth:
        type: apiKey
        in: header
        name: X-API-Key    

  schemas:
    Ack:
      description: Describes the ACK response.
      type: object
      properties:
        status:
          type: string
          description: If schema validation passes, status is ACK else it is NACK.
          enum:
          - ACK
          - NACK
      required:
      - status

    PreferredNetwork:
      description: Describes a collection of target Affiliates and/or Content providers.|
                      Google Agentic framework will route requests appropriately to these networks.
      type: object
      properties:
        name:
          type: object
          enum:
          - ONDC
          - ONEST
          - AGRI
          - MARKET_LINKAGE
          - VIDEO
          - WEATHER
          - ENAM
          - LLM #Internal only
          properties:
            urls:
              type: array
              items:
                type: string
          required:
          - urls
      required:
      - name

    Error:
      description: Describes an error object
      type: object
      properties:
        type:
          type: string
          enum:
            - CONTEXT_ERROR
            - CORE_ERROR
            - DOMAIN_ERROR            
            - JSON_SCHEMA_ERROR
        code:
          type: string
          description: Error code from a list of error codes from Google Agentic framework.
        path:
          type: string
          description: Path to json schema generating the error during json schema validation.
        message:
          type: string
          description: Human readable message describing the error.
      required:
      - type
      - code
    