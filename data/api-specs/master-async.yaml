openapi: 3.0.0
info:
  title: Google Agentic Core API
  description: Google Agentic Core API specification
  version: 0.0.1

security:
- ApiKeyAuth: []  
paths:
  /search:
    post:
      tags:
      - Domain spaecific search
      - Google Agentic framework
      - Master Agent
      description: Master Agent of the Google Agentic framework to transform text query into actionable insights
      requestBody:
        description: Search service by Google Agentic framework.
        content:
          application/json:
            schema:
              type: object
              properties:                
                transaction_id:
                  type: string
                message_id:
                  type: string
                query:
                  type: string
                location:
                  type: object
                  description: Contains a reverse geocoded address from user's current location (*Mobile Device or Web*).
                  properties:
                    address:
                      type: string
                    country:
                      $ref: '#/components/schemas/Country/properties/code'
                    city:
                      $ref: '#/components/schemas/City/properties/code'
                    zip:
                      type: string
                preferred_networks:
                  type: object
                  description: Contains a list of target BAPs and/or Content providers.|
                    Google Agentic framework will route requests appropriately to these networks.
                  properties:                    
                    $ref: '#/components/schemas/PreferredNetwork'                  
                intended_verticals:
                  type: object
                  description: Contains a list of verticals supported by Open Networks and intended by the end user.|
                    This field would be ignored for non-network Content providers viz. Video, Weather etc.
                  properties:
                    type: array
                    items:
                      type: string
              required:
              - transaction_id
              - message_id
              - query
              - preferred_networks
      responses:
        '200':
          description: Acknowledgement of message received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                    - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                - message

components:
  securitySchemes:
    ApiKeyAuth:
        type: apiKey
        in: header
        name: X-API-Key
  schemas:
    Ack:
      description: Describes the ACK response.
      type: object
      properties:
        status:
          type: string
          description: Describe the status of the ACK response. If schema validation passes, status is ACK else it is NACK.
          enum:
          - ACK
          - NACK
      required:
      - status

    PreferredNetwork:
      description: Describes a collection of target BAPs and/or Content providers.|
                      Google Agentic framework will route requests appropriately to these networks.
      type: object
      properties:
        name:
          type: object
          enum:
          - ONDC
          - ONEST
          - AGRI
          - VIDEO
          - WEATHER
          - ENAM
          - LLM #Internal only
          properties:
            urls:
              type: array
              items:
                type: string
          required:
          - urls
      required:
      - name      

    Country:
      description: Describes a country.
      type: object
      properties:
        name:
          type: string
          description: Name of the country.
        code:
          type: string
          description: Country code as per ISO 3166-1 and ISO 3166-2 format.

    City:
      type: object
      description: Describes a city.
      properties:
        name:
          type: string
          description: Name of the city.
        code:
          type: string
          description: City code.

    Error:
      description: Describes an error object
      type: object
      properties:
        type:
          type: string
          enum:
            - CONTEXT_ERROR
            - CORE_ERROR
            - DOMAIN_ERROR            
            - JSON_SCHEMA_ERROR
        code:
          type: string
          description: Error code from a list of error codes from Google Agentic framework.
        path:
          type: string
          description: Path to json schema generating the error. Used only during json schema validation errors.
        message:
          type: string
          description: Human readable message describing the error.
      required:
      - type
      - code
    