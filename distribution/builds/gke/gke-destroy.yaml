steps:
- name: 'hashicorp/terraform:1.6.1'
  id: 'init'
  dir: '${_WORKING_DIR_}'
  args: ['init', '--reconfigure', '--backend-config=${_BACKEND_CONFIG_}']  
- name: 'hashicorp/terraform:1.6.1'
  id: 'plan'
  dir: '${_WORKING_DIR_}'
  args: ['plan', '-destroy', '-out', 'out.destroy.plan', '-var-file=${_TFVARS_FILE_PATH_}']
  waitFor:
  - 'init'
- name: 'hashicorp/terraform:1.6.1'
  id: 'apply'
  dir: '${_WORKING_DIR_}'
  args: ['apply', 'out.destroy.plan']
  waitFor:
  - 'plan'
tags: ['cloud-builders-community']
serviceAccount: "projects/${_PROJECT_ID_}/serviceAccounts/${_PROJECT_NAME_}-sa@${_PROJECT_ID_}.iam.gserviceaccount.com"
logsBucket: "gs://${_LOG_BUCKET_}"
substitutions:
  _PROJECT_ID_: ''  
  _PROJECT_NAME_: ''  
  _WORKING_DIR_: ''  
  _TFVARS_FILE_PATH_: ''
  _LOG_BUCKET_: ''
  _BACKEND_CONFIG_: '' 
options:
    dynamicSubstitutions: true

