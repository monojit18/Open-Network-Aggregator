deployment:
  name: agriadapter-deploy
  serviceAccount: aggregator-dev-sa
  labels:
    app: agriadapter-deploy 
    version: v1
  selectorLabels:
    app: agriadapter-pod
    version: v1
  replicas: 1
  strategyType: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0
  nodeSelector:
    cloud.google.com/gke-nodepool: worker-pool
  containers:
  - name: agriadapter-app
    image: "<repo-name>/agri-adapter:v1.0"
    imagePullPolicy: Always
    memoryRequest: "500Mi"
    cpuRequest: "500m"
    memoryLimit: "1Gi"
    cpuLimit: "1"
    containerPorts: [10001]
    envVars:    
    - name: EVENT_RECEIVER_HTTP_HOST
      value: http://event-receiverapp-svc.utilities-dev.svc
    - name: PROJECT_ID
      value: <PROJECT_ID>
service:
  name: agriadapter-svc
  selector:
    app: agriadapter-pod
  type: ClusterIP
  ports:
  - protocol: TCP
    name: http
    port: 80
    targetPort: 10001
hpa:
  name: agriadapter-hpa
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agriadapter-deploy
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80