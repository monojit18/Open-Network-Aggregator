deployment:
  name: llmadapter-deploy
  serviceAccount: aggregator-dev-sa
  labels:
    app: llmadapter-deploy 
    version: v1
  selectorLabels:
    app: llmadapter-pod
    version: v1
  replicas: 1
  strategyType: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0
  nodeSelector:
    cloud.google.com/gke-nodepool: worker-pool
  containers:
  - name: llmadapter-app
    image: "<repo-name>/llm-adapter:v1.0"
    imagePullPolicy: Always
    memoryRequest: "500Mi"
    cpuRequest: "500m"
    memoryLimit: "1Gi"
    cpuLimit: "1"
    containerPorts: [10001]
    envVars:    
    - name: EVENT_RECEIVER_HTTP_HOST
      value: https://event-receiverlib-83053558111.asia-southeast1.run.app
    - name: GENAI_TEXTLIB_HOST
      value: http://genaitextapp-svc.vertexai.svc
    - name: PROJECT_ID
      value: <project-id>
service:
  name: llmadapter-svc
  selector:
    app: llmadapter-pod
  type: ClusterIP
  ports:
  - protocol: TCP
    name: http
    port: 80
    targetPort: 10001  