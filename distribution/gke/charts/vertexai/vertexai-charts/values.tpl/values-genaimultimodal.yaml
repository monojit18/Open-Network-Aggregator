deployment:
  name: genaimultimodalapp-deploy
  serviceAccount: vertexai-sa
  labels:
    app: genaimultimodalapp-deploy 
    version: v1
  selectorLabels:
    app: genaimultimodalapp-pod
    version: v1
  replicas: 1
  strategyType: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0
  nodeSelector:
    cloud.google.com/gke-nodepool: gkeappspool
  containers:
  - name: genaimultimodal-app
    image: "/genai-multimodallib:v1.0"
    imagePullPolicy: Always
    memoryRequest: "500Mi"
    cpuRequest: "500m"
    memoryLimit: "1Gi"
    cpuLimit: "1"
    containerPorts: [6067]
    envVars:
    - name: WEBSOCK_STREAMER_HTTP_HOST      
      value: https://streamer-serverlib-
    - name: GENAI_LOCATION
      value: us-central1
    - name: GENAI_GEMINI_VISION_MODEL
      value: gemini-1.5-pro
    - name: PROJECT_ID
      value: 
service:
  name: genaimultimodalapp-svc
  selector:
    app: genaimultimodalapp-pod
  type: ClusterIP
  ports:
  - protocol: TCP
    name: http
    port: 80
    targetPort: 6067