kind: HTTPRoute
apiVersion: gateway.networking.k8s.io/v1beta1
metadata:
  name: event-route  
  labels:
    gateway: external-https
spec:
  parentRefs:
  - kind: Gateway
    name: external-https
    namespace: gateway-ns  
  hostnames:
  - event-server.gcpwkshpdev.com
  rules:  
  - matches:
    - path:
        type: PathPrefix
        value: /event
    - path:
        type: PathPrefix
        value: /socket.io
    backendRefs:
    - name: event-serverapp-svc
      port: 80  