apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:  
  name: master-retail-healthcheck
  namespace: aggregator-dev
spec:
  default:
    checkIntervalSec: 15
    config:
      httpHealthCheck:
        port: 10003
        portSpecification: USE_FIXED_PORT
        requestPath: "/healthz"
      type: HTTP
    healthyThreshold: 1
    timeoutSec: 15
    unhealthyThreshold: 2
  targetRef:
    group: ''
    kind: Service
    name: master-retailagent-svc
