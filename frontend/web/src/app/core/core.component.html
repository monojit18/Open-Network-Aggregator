<mat-sidenav-container
  id="sidenavContainer"
  fullscreen
  [hasBackdrop]="false"
  class="sidenavContainer"
>
  <mat-sidenav
    #sidenav
    id="sidenav"
    mode="side"
    opened
    class="!rounded-none !hidden md:!block"
  >
    <app-sidenav></app-sidenav>
  </mat-sidenav>

  <mat-sidenav-content
    class="relative flex h-full max-w-full flex-1 flex-col overflow-hidden md:ml-[65px] max-[768px]:!p-4"
  >
    <main
      class="relative h-full w-full flex-1 transition-width"
      id="mainContent"
    >
      <div
        role="presentation"
        class="flex h-full flex-col focus-visible:outline-0"
      >
        <div class="flex-1 overflow-hidden">
          <div class="h-full">
            <div class="relative h-full">
              <div class="flex flex-col h-full w-full justify-between">
                <div class="sticky top-0 mb-1.5 z-10 h-14">
                  <app-header></app-header>
                </div>
                <div
                  id="emptyState"
                  *ngIf="(generativeData | json) == '{}'"
                  class="mb-10 h-[calc(100vh-250px)] md:h-[calc(100vh-150px)] flex flex-col justify-center"
                >
                  <app-empty-state
                    (onSearchClick)="interaction.makeCall($event)"
                  ></app-empty-state>
                  <!-- <app-loading></app-loading> -->
                </div>

                <div
                  class="scroll-container overflow-auto"
                  id="generative-content"
                  *ngIf="(generativeData | json) != '{}'"
                >
                  <app-generative-content
                    [transactionId]="transactionId"
                  ></app-generative-content>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div
          class="md:pt-0 dark:border-white/20 md:border-transparent md:dark:border-transparent w-full flex flex-col items-start"
        >
          <!-- <app-videos></app-videos> -->
          @if (isLoading) {

          <div class="w-full flex flex-row">
            <div
              class="mx-auto flex flex-col items-start flex-1 text-base md:max-w-3xl lg:max-w-[40rem] xl:max-w-[48rem] my-2"
            >
              <app-loading></app-loading>
            </div>
          </div>
          }
          <div class="flex flex-row w-full">
            <app-generative-interaction
              class="w-full"
              (onGenerate)="generateHandler($event)"
              [transactionId]="transactionId"
              #interaction
            ></app-generative-interaction>
          </div>
        </div>
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
